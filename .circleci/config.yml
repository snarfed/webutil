# CircleCI automatically reads this file from our repo and uses it for
# configuration. Docs:
# https://circleci.com/docs/2.0/configuration-reference/
# https://circleci.com/docs/2.0/sample-config/
version: 2.1

jobs:
  build:
    parameters:
      # which Python version and dependency resolution strategy to test:
      # * 3.12 + highest: newest deps
      # * 3.9 + lowest-direct: oldest direct deps at or above our version
      #   specifiers, to make sure we don't use a feature added in a higher
      #   version of a dep than we declare
      python:
        type: string
      resolution:
        type: enum
        enum: [lowest-direct, highest]

    docker:
      - image: cimg/python:<< parameters.python >>

    steps:
      - checkout

      - restore_cache:
          keys:
            - venv-2-{{ .Branch }}-<< parameters.python >>-<< parameters.resolution >>

      - run:
          name: Install dependencies
          command: |
            pip install uv

            # uv pip install instead of sync because sync uses venv
            #
            # can't use --all-extras because uv pip install doesn't support it well
            uv pip install --system --no-sources --resolution=<< parameters.resolution >> '.[google-cloud,html,tests]'

            # install CI tools separately so lowest-direct doesn't downgrade them
            uv pip install --system coverage coveralls flake8

            # google-cloud-sdk: https://cloud.google.com/sdk/docs/install#deb
            echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
            curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key --keyring /usr/share/keyrings/cloud.google.gpg add -
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates gnupg google-cloud-sdk google-cloud-cli-firestore-emulator openjdk-21-jre-headless pkg-config

      - run:
          name: Run tests
          command: |
            gcloud emulators firestore start --host-port=:8089 --database-mode=datastore-mode < /dev/null >& /tmp/firestore-emulator.log &
            sleep 5s
            python -m coverage run --omit=appengine_config.py -m unittest discover -v
            python -m coverage html -d /tmp/coverage_html
            if [ "$COVERALLS_REPO_TOKEN" != "" ]; then python -m coveralls || true; fi

            # check for unintentionally overridden test methods
            # https://flake8.pycqa.org/en/latest/user/error-codes.html#error-codes
            # https://flake8.pycqa.org/en/latest/user/options.html#cmdoption-flake8-select
            python -m flake8 --select=F811 webutil/tests/test_*.py

      - save_cache:
          key: venv-2-{{ .Branch }}-<< parameters.python >>-<< parameters.resolution >>
          paths:
            - /home/circleci/.pyenv
            # Ideally we'd cache these, but they need root, and the cimg/python
            # Docker image's default user is circleci :/
            # https://github.com/cypress-io/circleci-orb/issues/269
            #
            # - /usr/lib/google-cloud-sdk
            # - /usr/lib/jvm/java-21-openjdk-amd64

      - store_artifacts:
          path: /tmp/coverage_html

workflows:
  build:
    jobs:
      # two coupled combos; both must pass
      - build:
          name: python-3.12-highest
          python: '3.12'
          resolution: highest
      - build:
          name: python-3.9-lowest-direct
          python: '3.9'
          resolution: lowest-direct
