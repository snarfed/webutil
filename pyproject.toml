# https://packaging.python.org/en/latest/tutorials/packaging-projects/

[build-system]
requires = ['setuptools>=68.0']
build-backend = 'setuptools.build_meta'

[tool.setuptools.packages.find]
where = ['.']

[project]
name = 'pywebutil'
version = '1.0'
authors = [
    { name='Ryan Barrett', email='webutil@ryanb.org' },
]
description = 'Common utilities and handler code for Python web apps'
readme = 'README.md'
requires-python = '>=3.9'
keywords = ['App Engine', 'Flask', 'HTTP', 'web', 'utilities']
dependencies = [
    'cachetools>=3.1',
    'cryptography',
    'domain2idna>=1.12',
    'Flask>=2.0',
    'humanize>=4.0',
    'requests>=2.0',
    'requests-hardened>=1.0',
    'werkzeug',
]

# https://pypi.org/classifiers/
classifiers = [
    'Programming Language :: Python :: 3',
    'License :: Public Domain',
    'Operating System :: OS Independent',
    'Intended Audience :: Developers',
    'Development Status :: 5 - Production/Stable',
    'Topic :: Software Development :: Libraries :: Python Modules',
]

[project.urls]
'Homepage' = 'https://github.com/snarfed/webutil'
'Documentation' = 'https://oauth-dropins.readthedocs.io/en/latest/source/oauth_dropins.webutil.html'

[project.optional-dependencies]
tests = [
    'mox3 @ git+https://github.com/snarfed/mox3.git',
    'flask-caching',
    'httplib2',
    'lxml',
    'mf2py',
    'oauthlib',
    'prawcore',
    'python-tumblpy',
    'tweepy',
    'ujson',
    'urllib3',
    'webob',
    'websockets',
]
html = [
    'beautifulsoup4>=4.8',
    'mf2util>=0.5.0',
]
google-cloud = [
    'google-api-python-client',
    'google-cloud-logging>=3.0.0',
    'google-cloud-ndb>=2.0',
]
